name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Unit and Service Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements/dev.txt
            api_gateway/requirements.txt
            planner/requirements.txt
            worker/requirements.txt
            libs/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.txt

      - name: Run tests
        run: python -m pytest -q

  e2e:
    name: Docker Compose E2E
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements/dev.txt
            api_gateway/requirements.txt
            planner/requirements.txt
            worker/requirements.txt
            libs/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.txt

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Run e2e tests
        env:
          RUN_E2E: "1"
        run: python -m pytest -m "e2e and not stress_e2e and not resilience_e2e" -q

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Stop stack
        if: always()
        run: docker compose down -v
